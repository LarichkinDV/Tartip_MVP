name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: python -m pip install -e "backend[dev]"
      - name: Lint backend
        run: python -m ruff check backend
      - name: Check backend formatting
        run: python -m ruff format --check backend
      - name: Test backend
        run: python -m pytest backend/tests

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install frontend dependencies
        run: npm install --prefix frontend
      - name: Lint frontend
        run: npm run lint --prefix frontend
      - name: Build frontend
        run: npm run build --prefix frontend

  project-check:
    name: Project checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check project safety rules
        run: sh scripts/check_project.sh
      - name: Check Docker Compose syntax
        run: docker compose config --quiet
