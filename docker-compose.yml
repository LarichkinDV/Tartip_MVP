services:
  postgres:
    image: postgres:16-alpine
    container_name: tartip-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tartip}
      POSTGRES_USER: ${POSTGRES_USER:-tartip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tartip_local_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: tartip-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://tartip:tartip_local_password@postgres:5432/tartip}
      APP_ENV: ${APP_ENV:-local}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: tartip-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    restart: unless-stopped

  adminer:
    image: adminer:4
    container_name: tartip-adminer
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
