forbidden_claims:
  - id: FC-001
    forbidden_claim: "Tartip автоматически выбирает норму ГЭСН по BIM-элементу."
    allowed_replacement: "Tartip формирует кандидатное сопоставление через расчетную единицу, правила сопоставления и статус проверки."
  - id: FC-002
    forbidden_claim: "КСИ напрямую определяет норму ГЭСН."
    allowed_replacement: "КСИ используется как классификационный слой, но не является механизмом прямого выбора нормы."
  - id: FC-003
    forbidden_claim: "Фактические данные заменяют нормативную базу."
    allowed_replacement: "Фактические данные используются как аналитический и проверочный слой."
  - id: FC-004
    forbidden_claim: "Методика доказанно снижает трудоемкость."
    allowed_replacement: "Методика формализует расчетную цепочку и снижает долю повторного ручного ввода; количественная оценка трудоемкости требует отдельного хронометражного исследования."
  - id: FC-005
    forbidden_claim: "GRACE и Codex являются частью научного результата."
    allowed_replacement: "GRACE и Codex используются как инструменты организации разработки программной реализации."
  - id: FC-006
    forbidden_claim: "CalculationUnit хранит все данные жизненного цикла."
    allowed_replacement: "В Tartip CalculationUnit является нормативно-расчетным шаблоном, а фактические данные связаны преимущественно через WorkPackage / захватку."
  - id: FC-007
    forbidden_claim: "100 % и 0 % в экспериментальных таблицах означают универсальную точность методики."
    allowed_replacement: "Значения 100 % и 0 % трактуются только в пределах контрольного фрагмента."
